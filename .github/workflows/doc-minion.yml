name: Documentation Minion

on:
  workflow_dispatch:
    inputs:
      pr_ref:
        description: "PR reference (e.g., partio-io/cli#42)"
        required: true
        type: string
      dry_run:
        description: "Dry run"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  update-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Install minions
        run: |
          go install github.com/partio-io/minions/cmd/minions@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Run doc-update program
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          ARGS="run .minions/programs/doc-update.md"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="${ARGS} --dry-run"
          fi
          minions $ARGS
