name: Propose Features

on:
  schedule:
    - cron: "0 8,20 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no issues created)"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  issues: write

jobs:
  propose:
    runs-on: github-runner-partio-minion-ai-01
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4


      - name: Install minions
        run: |
          go install github.com/partio-io/minions/cmd/minions@v0.0.4
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Run propose program
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          ARGS="run .minions/programs/propose.md"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="${ARGS} --dry-run"
          fi
          minions $ARGS
